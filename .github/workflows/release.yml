name: Development DMG

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  universal-dmg:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked
      - name: Build universal development DMG
        run: ./scripts/build-macos-universal.sh
      - uses: actions/upload-artifact@v4
        with:
          name: codex-network-guard-development-universal
          path: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            target/universal-apple-darwin/release/bundle/dmg/*.sha256
      - name: Attach tagged development build
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            target/universal-apple-darwin/release/bundle/dmg/*.dmg
            target/universal-apple-darwin/release/bundle/dmg/*.sha256
